<section class="auth-page">
  <div class="auth-card">
    <div class="auth-card__head">
      <div class="auth-card__badge">PD</div>
      <div>
        <p class="eyebrow">Acesso</p>
        <h2>Faça login para continuar</h2>
      </div>
    </div>

    <p class="auth-card__intro">Entre com seu e-mail e senha para acessar os cursos e o painel de usuário.</p>

    <form class="auth-form" novalidate>
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" placeholder="seu@email.com" />

      <label for="password">Senha</label>
      <input id="password" name="password" type="password" placeholder="Senha secreta" />

      <button type="submit">Entrar</button>
    </form>

    <p class="auth-card__footer">Não tem conta? <a href="/auth">Cadastre-se</a></p>
  </div>
</section>
